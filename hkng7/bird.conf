# Ensure non-default v6 routes are included in main kernel v6 table.
# (local interfaces, etc.)
protocol pipe copy_local_v6 {
    table master6;
    peer table table_ibgp_v6;
    export filter local_v6_only;
    import none;
}

# Broadcast default v6 route to iBGP from border routers.
protocol pipe kernel_ibgp_v6_border {
  table master6;
  peer table table_ibgp_v6;

  export filter {
    preference = 1000;
    if net = ::/0 then accept;
    reject;
  };
  import none;
}



define ANNOUNCED_v6 = [  
  2001:678:1184::/48,
  2a0f:1cc5:1200::/40,
  2602:f92a:a440::/44,
  2a14:67c3:770::/44 
];

function ebgp_import_reject_zxix_hk_rs1() -> bool {
  return false;
}

function ebgp_import_accept_zxix_hk_rs1() -> bool {
  if (bgp_path ~ [= * =]) then return true;
  return false;
}

filter ebgp_import_zxix_hk_rs1 {
  if ebgp_import_reject_zxix_hk_rs1() then reject;
  if ebgp_import_accept_zxix_hk_rs1() then {
    bgp_large_community.add((202734, 140961, 8527));
    accept;
  }
  reject;
};

filter ebgp_export_v6_zxix_hk_rs1 {

  if net = ::/0 then {
    reject;
  }

  if (net ~ ANNOUNCED_v6) then accept;
  reject;
};

protocol bgp ebgp_v6_zxix_hk_rs1 {
  local as 202734;

  # Replace with actual source address
  source address 2001:db8::

  ipv4 {
    import keep filtered on;
    import filter ebgp_import_zxix_hk_rs1;
    export none;
  };
  ipv6 {
    import keep filtered on;
    import filter ebgp_import_zxix_hk_rs1;
    export filter ebgp_export_v6_zxix_hk_rs1;
  };
  graceful restart on;
  multihop;
  neighbor 2406:840:1f:1000::1 as 140961;
}
