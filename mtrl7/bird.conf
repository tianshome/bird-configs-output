# Replace with unique router_id
router id 10.0.0.127;

protocol device {
  scan time 5;
}

define LOCAL_v4 = [  
  10.30.0.0/16+,
  10.24.0.0/16+,
  10.23.0.0/16+,
  192.168.1.0/24+,
  192.168.8.0/24+,
  192.168.122.0/24+ 
];

filter local_v4_only {
  if dest = RTD_UNREACHABLE then reject;
  if (net ~ LOCAL_v4) then accept;
  reject;
};

define LOCAL_v6 = [  
  2001:678:1184::/48+,
  2a0f:1cc5:1200::/40,
  2a14:67c3:770::/44,
  fd00::/64+ 
];

filter local_v6_only {
  if (net ~ LOCAL_v6) then accept;
  reject;
};

protocol kernel kernel_v4 {
  learn;
  ipv4 {
    import filter {
      if dest = RTD_UNREACHABLE then reject;
      if net = 0.0.0.0/0 then reject;
      accept;
    };
    export filter local_v4_only;
  };
}

protocol kernel kernel_v6 {
  learn;
  ipv6 {
    import all;
    export filter local_v6_only;
  };
}

protocol direct direct_main {
  ipv6 {
    import all;
  };
  
  ipv4 {
    import all;
  };
}

# Keep these babel tables compact.
ipv4 table table_igp_v4;
ipv6 table table_igp_v6;

# ibgp tables for handling internet-scale backbone routes.
ipv4 table table_ibgp_v4;
ipv6 table table_ibgp_v6;

protocol direct direct_igp {
  ipv6 {
    table table_igp_v6;
    import filter {
      if net = ::/0 then reject;
      accept;
    };
  };
  
  ipv4 {
    table table_igp_v4;
    import all;
  };
}

# Copy link-local routes from other routers to kernel table
# for ibgp next hop resolution. 
protocol pipe igp_to_master4 {
    table table_igp_v4;
    peer table master4;
    export filter {
      if dest = RTD_UNREACHABLE then reject;
      if net = 0.0.0.0/0 then reject;
      accept;
    };
    import none;
}

protocol pipe igp_to_master6 {
    table table_igp_v6;
    peer table master6;
    export filter {
      if dest = RTD_UNREACHABLE then reject;
      if net = ::/0 then reject;
      accept;
    };
    import none;
}

protocol pipe cold_potato_to_ibgp4 {
    table master4;
    peer table table_ibgp_v4;
    export filter {
      if (bgp_large_community ~ [ (202734, *, *) ]) then {
        preference = 1500;
        accept;
      }
      reject;
    };
    import none;
}

protocol pipe cold_potato_to_ibgp6 {
    table master6;
    peer table table_ibgp_v6;
    export filter {
      if (bgp_large_community ~ [ (202734, *, *) ]) then {
        preference = 1500;
        accept;
      }
      reject;
    };
    import none;
}


filter exclude_unreachable {
  if dest = RTD_UNREACHABLE then reject;
  accept;
}

protocol babel babel_main {
  ipv6 {
    table table_igp_v6;
    import filter local_v6_only;
    export filter local_v6_only;
  };

  ipv4 {
    table table_igp_v4;
    import filter exclude_unreachable;
    export filter exclude_unreachable;
  };

  interface "tap_mtrl2" {
    type tunnel;
    rtt cost 512;
    rtt min 1ms;
    rtt max 512ms;
    rxcost 3;
  };

  interface "tap_nycm1" {
    type tunnel;
    rtt cost 512;
    rtt min 1ms;
    rtt max 512ms;
    rxcost 3;
  };

};


# Copy of local-only v4 in a separate table
ipv4 table local_only_table;

protocol pipe copy_local_only {
    table master4;
    peer table local_only_table;
    export filter local_v4_only;
    import none;
}

protocol kernel kernel_local_only {
  learn;
  kernel table 253;

  ipv4 {
    table local_only_table;
    import none;
    export all;
  };
}


filter ibgp_nexthop_rewrite {
  if ifname = "eth0" then {
    bgp_next_hop = fd00::1514:7;
    preference = 100;
  }
  if ifname = "eth1" then {
    bgp_next_hop = fd00::1514:7;
    preference = 100;
  }
  accept;
}

protocol bgp ibgp_mtrl2 {
  local as 64512;
  neighbor fd00::1263:2 as 64512;
  source address fd00::1514:7;
  multihop 8;

  igp metric on;
  path metric off;

  hold time 6;
  connect delay time 1;
  connect retry time 3;

  error wait time 5, 10;
  error forget time 60;

  ipv4 {
    table table_ibgp_v4;
    import all;
    export filter ibgp_nexthop_rewrite;
    gateway recursive;
    add paths;

    # Filtered to exclude "unreachable" routes (e.g., babel)
    igp table master4;

  };

  ipv6 {
    table table_ibgp_v6;
    import all;
    export filter ibgp_nexthop_rewrite;
    gateway recursive;
    add paths;

    igp table master6;
  };
}

protocol bgp ibgp_sttl1 {
  local as 64512;
  neighbor fd00::1253:1 as 64512;
  source address fd00::1514:7;
  multihop 8;

  igp metric on;
  path metric off;

  hold time 6;
  connect delay time 1;
  connect retry time 3;

  error wait time 5, 10;
  error forget time 60;

  ipv4 {
    table table_ibgp_v4;
    import all;
    export filter ibgp_nexthop_rewrite;
    gateway recursive;
    add paths;

    # Filtered to exclude "unreachable" routes (e.g., babel)
    igp table master4;

  };

  ipv6 {
    table table_ibgp_v6;
    import all;
    export filter ibgp_nexthop_rewrite;
    gateway recursive;
    add paths;

    igp table master6;
  };
}



protocol kernel kernel_ibgp_v4 {
  learn;
  kernel table 789;

  ipv4 {
    table table_ibgp_v4;
    import all;
    export filter {
      if dest = RTD_UNREACHABLE then reject;
      accept;
    };
  };
}

protocol kernel kernel_ibgp_v6 {
  learn;
  kernel table 789;

  ipv6 {
    table table_ibgp_v6;
    import all;
    export all;
  };
}

# Ensure non-default v6 routes are included in main kernel v6 table.
# (local interfaces, etc.)
protocol pipe copy_local_v6 {
    table master6;
    peer table table_ibgp_v6;
    export filter local_v6_only;
    import none;
}




define ANNOUNCED_v6 = [  
  2001:678:1184::/48,
  2a0f:1cc5:1200::/40,
  2602:f92a:a440::/44,
  2a14:67c3:770::/44 
];

function ebgp_import_reject_cxix_rs1() -> bool {
  return false;
}

function ebgp_import_accept_cxix_rs1() -> bool {
  if (bgp_path ~ [= * =]) then return true;
  return false;
}

filter ebgp_import_cxix_rs1 {
  if ebgp_import_reject_cxix_rs1() then reject;
  if ebgp_import_accept_cxix_rs1() then {
    bgp_large_community.add((202734, 64501, 15147));
    accept;
  }
  reject;
};

filter ebgp_export_v6_cxix_rs1 {

  if net = ::/0 then {
    reject;
  }

  if (net ~ ANNOUNCED_v6) then accept;
  reject;
};

protocol bgp ebgp_v6_cxix_rs1 {
  local as 202734;

  # Replace with actual source address
  source address 2001:db8::

  ipv4 {
    import keep filtered on;
    import filter ebgp_import_cxix_rs1;
    export none;
  };
  ipv6 {
    import keep filtered on;
    import filter ebgp_import_cxix_rs1;
    export filter ebgp_export_v6_cxix_rs1;
  };
  graceful restart on;
  multihop;
  neighbor 2a0f:7803:fc60:aaaa::6450:1 as 64501;
}
function ebgp_import_reject_he_feed() -> bool {
  return false;
}

function ebgp_import_accept_he_feed() -> bool {
  return false;
}

filter ebgp_import_he_feed {
  if ebgp_import_reject_he_feed() then reject;
  if ebgp_import_accept_he_feed() then {
    bgp_large_community.add((202734, 393338, 15147));
    accept;
  }
  reject;
};

filter ebgp_export_v6_he_feed {

  if net = ::/0 then {
    reject;
  }

  if (net ~ ANNOUNCED_v6) then accept;
  if (bgp_large_community ~ [ (202734, *, *) ]) then accept;
  reject;
};

protocol bgp ebgp_v6_he_feed {
  local as 202734;

  # Replace with actual source address
  source address 2001:db8::

  ipv4 {
    table table_ibgp_v4;
    import keep filtered on;
    import filter ebgp_import_he_feed;
    export none;
  };
  ipv6 {
    table table_ibgp_v6;
    import keep filtered on;
    import filter ebgp_import_he_feed;
    export filter ebgp_export_v6_he_feed;
  };
  graceful restart on;
  multihop;
  neighbor 2600:7000:1000::11 as 393338;
}

